name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build CLI
        run: go build -trimpath -o build/verba${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/verba
      - name: Check example
        run: go run ./cmd/verba check examples/hello
      - name: Check formatting
        run: go run ./cmd/verba fmt --check examples/hello
      - name: Build example
        run: go run ./cmd/verba build -o build/hello${{ runner.os == 'Windows' && '.exe' || '' }} examples/hello
